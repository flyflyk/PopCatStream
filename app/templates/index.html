<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopCatStream</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/modal.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
</head>
<body style="background-color: #333; color: #FFD700;"> <!-- 主頁背景顏色 -->

    <!-- 標頭 -->
    <header style="display: flex; align-items: center; justify-content: space-between; padding: 20px;">
        <div style="flex: 1;">
            <a href="/">
                <img src="/static/images/popcat.png" alt="平台 Logo" style="height: 50px;">
            </a>
        </div>
        <h2 style="flex: 1; text-align: center; margin: 0; font-family: 'Fredoka One', sans-serif; font-size: 28px; color: #fce17d; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);">popcatstream</h2>
        <div id="auth-buttons" style="flex: 1; text-align: right;">
            <!-- 這裡可以放按鈕或其他內容 -->
        </div>
    </header>
    

    <!-- 主要內容 -->
    <main style="text-align: center; padding: 50px;">
        <h1>這是直播平台</h1>
        <p>這裡可以直播！</p>
    </main>

    {% include 'login_modal.html' %}
    {% include 'signup_modal.html' %}

    <!-- 載入 JavaScript -->
    <script src="/static/js/main.js"></script>
    <script src="/static/js/login_modal.js"></script>
    <script src="/static/js/signup_modal.js"></script>

</body>
</html>
