<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopCatStream</title>
    <link rel="stylesheet" href="/static/css/main.css"> <!-- 主樣式 -->
    <link rel="stylesheet" href="/static/css/modal.css"> <!-- 模態框樣式 -->
</head>
<body style="background-color: #333; color: #FFD700;"> <!-- 主頁背景顏色 -->

    <!-- 標頭 -->
    <header style="display: flex; justify-content: space-between; align-items: center; padding: 20px;">
        <div>
            <a href="/">
                <img src="/static/images/popcat.png" alt="平台 Logo" style="height: 50px;"> <!-- 替換為你的 logo 圖片 -->
            </a>
        </div>
        <div>
            <button class="login-button" onclick="openLoginModal()">Log in</button>
            <button class="signup-button" onclick="openSignupModal()">Sign up</button>
        </div>
    </header>

    <!-- 主要內容 -->
    <main style="text-align: center; padding: 50px;">
        <h1>這是直播平台</h1>
        <p>這裡可以直播！</p>
    </main>

    <!-- 登录模态框 -->
    {% include 'login_modal.html' %}

    <!-- 注册模态框 -->
    {% include 'signup_modal.html' %}

    <!-- 載入 JavaScript -->
    <script src="/static/js/modal.js"></script> 

</body>
</html>
