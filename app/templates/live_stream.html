<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopCatStream</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/chat.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
</head>
<body style="background-color: #333; color: #FFD700;"> <!-- 主頁背景顏色 -->

    <!-- 標頭 -->
    <header style="display: flex; align-items: center; justify-content: space-between; padding: 20px;">
        <div style="flex: 1;">
            <a href="/">
                <img src="/static/images/popcat.png" alt="平台 Logo" style="height: 50px;">
            </a>
        </div>
        <h2 class="site-title">popcatstream</h2>
        <div id="auth-buttons" style="flex: 1; text-align: right;">
        </div>
    </header>
    
    <!-- 下拉選單 -->
    <div class="menu" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
    </div>
    <div id="menu-options" style="display: none;">
        <div id="create-button"></div>
    </div>

    <!-- 主要內容 -->
    <div style="display: flex;">
        <div style="margin-left: 100px; flex: 1;"> 
            <main style="padding: 50px;">
                <!-- 移除 liveVideo 外層容器，直接放在 remoteVideos 中 -->
                <div style="margin-top: 20px; text-align: left;">
                    <div id="remoteVideos" style="flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-wrap: wrap;">
                        <video id="liveVideo" width="700" height="400" controls autoplay></video>
                        <!-- 這裡會動態添加遠端視頻 -->
                    </div>
                </div>
                <div class="control-buttons">
                    <button id="shareScreenButton" class="oval-button">分享螢幕</button>
                    <button id="startCameraButton" class="oval-button">打開視訊鏡頭</button>
                </div>
            </main>
        </div>
    
        {% include 'chat.html' %}
    </div>
    
    

    <!-- 載入 JavaScript -->
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <script src="/static/js/live_stream.js"></script>
    <script src="/static/js/chat.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
